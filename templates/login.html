<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberScan Pro — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0e1a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glowing orbs */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,212,255,.08) 0%, transparent 70%);
      top: -200px;
      left: -200px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 420px;
      background: rgba(13, 20, 40, 0.85);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 16px;
      padding: 44px 40px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(0, 212, 255, .08), 0 24px 60px rgba(0,0,0,.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, #00d4ff 0%, #0066ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(0,212,255,.4);
    }

    .logo-text h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .logo-text p {
      font-size: 0.72rem;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 1px;
    }

    .tagline {
      font-size: 0.82rem;
      color: #4a6080;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #8a9bb5;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #3a5070;
      pointer-events: none;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      color: #e0e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: rgba(0,212,255,.5);
      background: rgba(0,212,255,.04);
      box-shadow: 0 0 0 3px rgba(0,212,255,.08);
    }

    input::placeholder { color: #3a5070; }

    /* Password toggle */
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #3a5070;
      font-size: 15px;
      user-select: none;
      transition: color .2s;
    }
    .toggle-pw:hover { color: #00d4ff; }

    .error-msg {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 60, 80, .1);
      border: 1px solid rgba(255, 60, 80, .3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #ff6b7a;
      margin-bottom: 18px;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #00d4ff 0%, #0066ff 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(0,212,255,.25);
    }

    .btn-login:hover {
      opacity: .92;
      box-shadow: 0 6px 28px rgba(0,212,255,.4);
    }
    .btn-login:active { transform: scale(.98); }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 0.72rem;
      color: #2a3a55;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.68rem;
      color: #3a6080;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-text">
        <h1>CyberScan Pro</h1>
        <p>Security Intelligence</p>
      </div>
    </div>

    <p class="tagline">Sign in to access your cybersecurity dashboard.</p>

    {% if error %}
    <div class="error-msg">
      <span>⚠️</span> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            autofocus
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
          <span class="toggle-pw" onclick="togglePw()" title="Show/hide password" id="pw-eye">👁️</span>
        </div>
      </div>

      <button type="submit" class="btn-login">🚀 Sign In</button>
    </form>

    <div class="footer-note">
      CyberScan Pro v2.0 &nbsp;·&nbsp; All rights reserved
      <br/>
      <span class="badge">🔐 Secured with session authentication</span>
    </div>
  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('password');
      const eye = document.getElementById('pw-eye');
      if (inp.type === 'password') {
        inp.type = 'text';
        eye.textContent = '🙈';
      } else {
        inp.type = 'password';
        eye.textContent = '👁️';
      }
    }
  </script>
</body>
</html>
